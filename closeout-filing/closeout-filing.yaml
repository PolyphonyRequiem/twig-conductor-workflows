# closeout-filing — File Closeout Findings as ADO Work Items
#
# Takes SDLC closeout observations (the JSON output from the close_out agent)
# and files them as ADO Issues and Tasks under Epic #1603 (Closeout Findings).
#
# Deduplicates against existing items to avoid double-filing.
#
# 3-agent workflow:
#   Phase 1: Scanner — reads existing closeout items, identifies duplicates
#   Phase 2: Review Gate — shows filing plan for human approval/editing
#   Phase 3: Filer — creates Issue + Tasks for approved findings
#
# Usage (always use --web):
#   conductor run closeout-filing.yaml --web \
#     --input epic_id=1519 \
#     --input observations="Feature delivered in ~4 hours..." \
#     --input 'improvements=["Enforce PR-per-group discipline", "Add twig flush command"]'
#
#   # Skip deduplication (force-file all):
#   conductor run closeout-filing.yaml --web \
#     --input epic_id=1519 \
#     --input observations="..." \
#     --input 'improvements=[...]' \
#     --input skip_dedup=true

workflow:
  name: closeout-filing
  description: File SDLC closeout observations as ADO work items with deduplication
  version: "1.0.0"
  metadata:
    tracker: ado
    project_url: https://dev.azure.com/dangreen-msft/Twig
    worktree_name: "twig2-{work_item_id}"
    worktree_description: "Closeout filing worktree"
  entry_point: scanner
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
  input:
    epic_id:
      type: number
      required: true
      description: The completed epic's ADO work item ID
    observations:
      type: string
      required: true
      description: The closeout observations text (from close_out agent output)
    improvements:
      type: string
      required: true
      description: JSON array of improvement suggestions (from close_out agent output)
    skip_dedup:
      type: boolean
      required: false
      default: false
      description: Skip deduplication — file all improvements as new tasks
  context:
    mode: explicit
  limits:
    max_iterations: 30

agents:
  # ---------------------------------------------------------------------------
  # PHASE 1: SCANNER — gather existing data, identify duplicates
  # ---------------------------------------------------------------------------
  - name: scanner
    description: Scans existing closeout items and produces a deduplicated filing plan
    model: claude-sonnet-4.6
    input:
      - workflow.input.epic_id
      - workflow.input.observations
      - workflow.input.improvements
      - workflow.input.skip_dedup?
    system_prompt: !file prompts/scanner.system.md
    prompt: !file prompts/scanner.prompt.md
    output:
      epic_title:
        type: string
        description: The completed epic's title
      existing_issue_id:
        type: number
        required: false
        description: Existing closeout Issue ID (omitted when none exists)
      existing_task_ids:
        type: array
        description: IDs of existing tasks under the closeout Issue
      filing_plan:
        type: array
        description: Array of {improvement, status, duplicate_of_id, duplicate_of_title, suggested_title}
      new_count:
        type: number
        description: Number of new findings to file
      duplicate_count:
        type: number
        description: Number of duplicates skipped
    routes:
      - to: review_gate

  # ---------------------------------------------------------------------------
  # PHASE 2: REVIEW GATE — human approval of filing plan
  # ---------------------------------------------------------------------------
  - name: review_gate
    type: human_gate
    description: Shows the filing plan for human review before creating work items
    input:
      - scanner.output
      - workflow.input.epic_id
    prompt: |
      ## Closeout Filing Plan for Epic #{{ workflow.input.epic_id }} — {{ scanner.output.epic_title }}

      **New findings to file:** {{ scanner.output.new_count }}
      **Duplicates (will skip):** {{ scanner.output.duplicate_count }}

      ### Items to file:
      {% for item in scanner.output.filing_plan %}
      {% if item.status == 'new' %}
      - ✅ **{{ item.suggested_title }}**
        _{{ item.improvement }}_
      {% else %}
      - ⏭️ ~~{{ item.suggested_title }}~~ (duplicate of #{{ item.duplicate_of_id }}: {{ item.duplicate_of_title }})
      {% endif %}
      {% endfor %}
    options:
      - label: "Approve — file all new items"
        value: approved
        route: filer
      - label: "Edit — provide feedback on what to change"
        value: edit
        route: scanner
        prompt_for: feedback
      - label: "Skip — don't file anything"
        value: skip
        route: $end

  # ---------------------------------------------------------------------------
  # PHASE 3: FILER — create Issue + Tasks, add descriptions
  # ---------------------------------------------------------------------------
  - name: filer
    description: Creates ADO work items for new findings and adds descriptions
    model: claude-sonnet-4.6
    input:
      - workflow.input.epic_id
      - workflow.input.observations
      - workflow.input.improvements
      - scanner.output
    system_prompt: !file prompts/filer.system.md
    prompt: !file prompts/filer.prompt.md
    output:
      issue_id:
        type: number
        description: The closeout Issue ID (existing or newly created)
      tasks_created:
        type: array
        description: Array of {id, title} for each new task created
      tasks_skipped:
        type: array
        description: Array of {improvement, duplicate_of} for each skipped duplicate
      summary:
        type: string
        description: Human-readable summary of what was filed
    routes:
      - to: $end

# =============================================================================
# WORKFLOW OUTPUT
# =============================================================================
output:
  epic_id: "{{ workflow.input.epic_id }}"
  issue_id: "{{ filer.output.issue_id }}"
  tasks_created: "{{ filer.output.tasks_created | json }}"
  tasks_skipped: "{{ filer.output.tasks_skipped | json }}"
  summary: "{{ filer.output.summary }}"
