# planning-pr.yaml — Commit and link plan artifacts
#
# Commits plan documents to a planning/<id> branch, pushes, links
# the plan artifact to the work item, and creates a PR.
#
# Idempotency: branch_check at entry skips if branch already exists.
workflow:
  name: planning-pr
  description: Commit plans, push branch, link artifacts, create PR
  metadata:
    dashboard_hidden: true
  entry_point: branch_check
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
  input:
    work_item_id:
      type: number
      required: true
    plan_path:
      type: string
      required: true
    title:
      type: string
      required: false
      default: ""
    intent:
      type: string
      required: false
      default: resume
  context:
    mode: explicit
  limits:
    max_iterations: 10

agents:
  # ── IDEMPOTENCY CHECK ─────────────────────────────────────────
  - name: branch_check
    description: Check if planning branch already exists
    type: script
    input:
      - workflow.input.work_item_id
      - workflow.input.intent?
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/check-branch.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: $end
        when: "{{ output.branch_exists and workflow.input.intent == 'resume' }}"
      - to: branch_pusher

  # ── BRANCH PUSHER (script) ────────────────────────────────────
  - name: branch_pusher
    description: Commit plan, push branch, link artifact to work item
    type: script
    input:
      - workflow.input.work_item_id
      - workflow.input.plan_path
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/push-planning-branch.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-PlanPath"
      - "{{ workflow.input.plan_path }}"
    routes:
      - to: pr_submit

  # ── PR SUBMIT (script) ──────────────────────────────────────────
  - name: pr_submit
    description: Creates a GitHub PR for the planning branch
    type: script
    input:
      - workflow.input.work_item_id
      - workflow.input.title?
      - branch_pusher.output
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $env:GH_PROMPT_DISABLED = "1"
        $id = '{{ workflow.input.work_item_id }}'
        $title = '{{ workflow.input.title }}'
        $branch = '{{ branch_pusher.output.branch_name }}'
        $planUrl = '{{ branch_pusher.output.plan_url }}'
        # Derive repo slug from git remote so gh never prompts for repo selection
        $remoteUrl = (git remote get-url origin 2>$null) ?? ''
        $repo = if ($remoteUrl -match 'github\.com[/:]([^/]+/[^/.]+)') { $Matches[1] } else { '' }
        if (-not $repo) {
          [ordered]@{ pr_number = 0; pr_url = ""; error = "Could not determine GitHub repo from git remote" } | ConvertTo-Json
          exit 0
        }
        $body = "## Planning Artifacts`n`nSolution design and implementation plan for #$id.`n`n**Plan document:** $planUrl`n`nThis PR contains planning artifacts only - no code changes."
        $prUrl = gh pr create --repo $repo --base main --head $branch --title "docs: plan for #$id - $title" --body $body 2>&1
        if ($LASTEXITCODE -eq 0) {
          $prNumber = if ($prUrl -match '/pull/(\d+)') { [int]$Matches[1] } else { 0 }
          twig set $id --output json 2>$null | Out-Null
          twig link artifact $prUrl --name "Planning PR" --output json 2>$null | Out-Null
          [ordered]@{ pr_number = $prNumber; pr_url = $prUrl.Trim() } | ConvertTo-Json
        } else {
          [ordered]@{ pr_number = 0; pr_url = ""; error = ($prUrl -join "`n") } | ConvertTo-Json
        }
    routes:
      - to: $end

output:
  branch_name: "{{ branch_pusher.output.branch_name if branch_pusher is defined else branch_check.output.branch_name }}"
  plan_url: "{{ branch_pusher.output.plan_url if branch_pusher is defined else '' }}"
  pr_number: "{{ pr_submit.output.pr_number if pr_submit is defined else 0 }}"
