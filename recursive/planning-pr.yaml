# planning-pr.yaml — Commit and link plan artifacts
#
# Commits plan documents to a planning/<id> branch, pushes, links
# the plan artifact to the work item, and creates a PR.
#
# Idempotency: branch_check at entry skips if branch already exists.
workflow:
  name: planning-pr
  description: Commit plans, push branch, link artifacts, create PR
  metadata:
    dashboard_hidden: true
  entry_point: branch_check
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
  input:
    work_item_id:
      type: number
      required: true
    plan_path:
      type: string
      required: true
    title:
      type: string
      required: false
      default: ""
    intent:
      type: string
      required: false
      default: resume
  context:
    mode: explicit
  limits:
    max_iterations: 10

agents:
  # ── IDEMPOTENCY CHECK ─────────────────────────────────────────
  - name: branch_check
    description: Check if planning branch already exists
    type: script
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/check-branch.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: $end
        when: "{{ output.branch_exists and workflow.input.intent == 'resume' }}"
      - to: branch_pusher

  # ── BRANCH PUSHER (script) ────────────────────────────────────
  - name: branch_pusher
    description: Commit plan, push branch, link artifact to work item
    type: script
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/push-planning-branch.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-PlanPath"
      - "{{ workflow.input.plan_path }}"
    routes:
      - to: pr_submit

  # ── PR SUBMIT (script) ──────────────────────────────────────────
  - name: pr_submit
    description: Creates a GitHub PR for the planning branch
    type: script
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $id = '{{ workflow.input.work_item_id }}'
        $title = '{{ workflow.input.title }}'
        $branch = '{{ branch_pusher.output.branch_name }}'
        $planUrl = '{{ branch_pusher.output.plan_url }}'
        $body = "## Planning Artifacts`n`nSolution design and implementation plan for #$id.`n`n**Plan document:** $planUrl`n`nThis PR contains planning artifacts only - no code changes."
        $result = gh pr create --base main --head $branch --title "docs: plan for #$id - $title" --body $body --json number,url 2>&1
        if ($LASTEXITCODE -eq 0) {
          $pr = $result | ConvertFrom-Json
          # Link PR to work item
          twig set $id --output json 2>$null | Out-Null
          twig link artifact $pr.url --name "Planning PR" --output json 2>$null | Out-Null
          [ordered]@{ pr_number = $pr.number; pr_url = $pr.url } | ConvertTo-Json
        } else {
          [ordered]@{ pr_number = 0; pr_url = ""; error = ($result -join "`n") } | ConvertTo-Json
        }
    routes:
      - to: $end

output:
  branch_name: "{{ branch_pusher.output.branch_name if branch_pusher is defined else branch_check.output.branch_name }}"
  plan_url: "{{ branch_pusher.output.plan_url if branch_pusher is defined else '' }}"
  pr_number: "{{ pr_submit.output.pr_number if pr_submit is defined else 0 }}"
