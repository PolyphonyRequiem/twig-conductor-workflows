# twig-sdlc-full — Composite planning + implementation workflow
#
# Runs twig-sdlc-planning (recursive planner) then twig-sdlc-implement
# (monolithic implementation) as sequential sub-workflows.
#
# Usage:
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --web
#   conductor run twig-sdlc-full@twig --input prompt="Add twig export command" --web
workflow:
  name: twig-sdlc-full
  description: Full SDLC — recursive planning then monolithic implementation
  entry_point: planning
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
  input:
    work_item_id:
      type: number
      required: false
      description: ADO work item ID (Epic or Issue).
    prompt:
      type: string
      required: false
      description: Natural language description of what to build. Creates a new Epic.
    skip_plan_review:
      type: boolean
      required: false
      default: false
      description: Skip the human plan approval gate.
    plan_path:
      type: string
      required: false
      description: Path to an already-approved plan file. Skips planning entirely.
  context:
    mode: explicit
  limits:
    max_iterations: 250

agents:
  # ── PHASE 1: PLANNING ────────────────────────────────────────────
  - name: planning
    type: workflow
    workflow: ./twig-sdlc-planning.yaml
    input:
      - workflow.input.work_item_id?
      - workflow.input.prompt?
      - workflow.input.skip_plan_review?
      - workflow.input.plan_path?
    output:
      epic_id:
        type: number
      epic_title:
        type: string
      plan_path:
        type: string
      plan_summary:
        type: string
      issues_created:
        type: number
    routes:
      - to: implementation

  # ── PHASE 2: IMPLEMENTATION ──────────────────────────────────────
  - name: implementation
    type: workflow
    workflow: ./twig-sdlc-implement.yaml
    input:
      - workflow.input.work_item_id?
      - workflow.input.plan_path?
    output:
      observations:
        type: string
      improvements:
        type: array
    routes:
      - to: $end

output:
  epic_id: "{{ planning.output.epic_id if planning is defined else 0 }}"
  plan_path: "{{ planning.output.plan_path if planning is defined else '' }}"
  observations: "{{ implementation.output.observations if implementation is defined else '' }}"
  improvements: "{{ (implementation.output.improvements | json) if implementation is defined else '[]' }}"
