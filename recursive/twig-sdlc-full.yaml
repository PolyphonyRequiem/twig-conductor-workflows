# twig-sdlc-full — Composite planning + implementation workflow
#
# Runs twig-sdlc-planning (recursive planner) then twig-sdlc-implement
# (monolithic implementation) as sequential sub-workflows.
#
# If an existing plan is detected and plan_path wasn't explicitly provided,
# a human gate asks whether to reuse the existing plan or replan from scratch.
#
# Usage:
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --web
#   conductor run twig-sdlc-full@twig --input prompt="Add twig export command" --web
workflow:
  name: twig-sdlc-full
  description: Full SDLC — recursive planning then monolithic implementation
  entry_point: plan_detector
  metadata:
    tracker: ado
    project_url: https://dev.azure.com/dangreen-msft/Twig
    work_item_id_agent: intake
    work_item_id_field: epic_id
    worktree_name: "twig2-{work_item_id}"
    worktree_description: "Full SDLC worktree (planning + implementation)"
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      twig:
        command: twig-mcp
        tools: ["*"]
  input:
    work_item_id:
      type: number
      required: false
      description: ADO work item ID (Epic or Issue).
    prompt:
      type: string
      required: false
      description: Natural language description of what to build. Creates a new Epic.
    skip_plan_review:
      type: boolean
      required: false
      default: false
      description: Skip the human plan approval gate.
    plan_path:
      type: string
      required: false
      description: Path to an already-approved plan file. Skips planning entirely.
  context:
    mode: explicit
  limits:
    max_iterations: 250

agents:
  # ── PLAN DETECTION ──────────────────────────────────────────────
  - name: plan_detector
    description: Checks for an existing plan and child work items for this Epic
    model: claude-sonnet-4.6
    input:
      - workflow.input.work_item_id?
      - workflow.input.plan_path?
    prompt: |
      {% if workflow.input.plan_path %}
      An explicit plan_path was provided: {{ workflow.input.plan_path }}
      Set has_explicit_plan to true and set discovered_plan_path to that value.
      Set has_existing_plan to true.
      {% elif workflow.input.work_item_id %}
      Check if an existing plan document exists for work item #{{ workflow.input.work_item_id }}.
      Search for files matching `docs/projects/*.plan.md` using the filesystem.
      Also use twig to check if the work item has child Issues/Tasks already created.

      Run: `twig set {{ workflow.input.work_item_id }}` then `twig tree --depth 1`
      to see if children exist.

      Search for plan files: look for `.plan.md` files in `docs/projects/` that
      reference this work item ID in their content.
      {% else %}
      No work_item_id provided (prompt-only flow). No existing plan to detect.
      Set all fields to false/empty.
      {% endif %}
    output:
      has_explicit_plan:
        type: boolean
        description: True if plan_path was explicitly provided by the user
      has_existing_plan:
        type: boolean
        description: True if a plan document was found for this work item
      discovered_plan_path:
        type: string
        description: Path to the discovered plan file (empty if none found)
      has_child_items:
        type: boolean
        description: True if the work item already has child Issues/Tasks
      child_count:
        type: number
        description: Number of child work items found
    routes:
      - to: implementation
        when: "{{ output.has_explicit_plan }}"
      - to: replan_gate
        when: "{{ output.has_existing_plan }}"
      - to: planning

  # ── REPLAN GATE (human decision) ────────────────────────────────
  - name: replan_gate
    type: human_gate
    description: Existing plan detected — choose to reuse or replan
    input:
      - plan_detector.output
    prompt: |
      An existing plan was found at: {{ plan_detector.output.discovered_plan_path }}
      {% if plan_detector.output.has_child_items %}
      The work item also has {{ plan_detector.output.child_count }} child items already created.
      Replanning will delete all child items tagged with "twig" before creating new ones.
      {% endif %}

      What would you like to do?
    options:
      - label: "Use existing plan"
        value: "use_existing"
        route: implementation
      - label: "Replan from scratch"
        value: "replan"
        route: planning

  # ── PHASE 1: PLANNING ────────────────────────────────────────────
  - name: planning
    type: workflow
    workflow: ./twig-sdlc-planning.yaml
    input:
      - workflow.input.work_item_id?
      - workflow.input.prompt?
      - workflow.input.skip_plan_review?
    output:
      epic_id:
        type: number
      epic_title:
        type: string
      plan_path:
        type: string
      plan_summary:
        type: string
      issues_created:
        type: number
    routes:
      - to: implementation

  # ── PHASE 2: IMPLEMENTATION ──────────────────────────────────────
  - name: implementation
    type: workflow
    workflow: ./twig-sdlc-implement.yaml
    input:
      - planning.output?
      - plan_detector.output?
      - workflow.input.work_item_id?
    input_mapping:
      work_item_id: "{{ planning.output.epic_id if planning is defined and planning.output.epic_id is defined else workflow.input.work_item_id }}"
      plan_path: "{{ planning.output.plan_path if planning is defined and planning.output.plan_path is defined else plan_detector.output.discovered_plan_path }}"
    output:
      observations:
        type: string
      improvements:
        type: array
    routes:
      - to: $end

output:
  epic_id: "{{ planning.output.epic_id if planning is defined and planning.output.epic_id is defined else workflow.input.work_item_id }}"
  plan_path: "{{ planning.output.plan_path if planning is defined and planning.output.plan_path is defined else plan_detector.output.discovered_plan_path if plan_detector is defined else '' }}"
  observations: "{{ implementation.output.observations if implementation is defined and implementation.output.observations is defined else '' }}"
  improvements: "{{ (implementation.output.improvements | json) if implementation is defined and implementation.output.improvements is defined else '[]' }}"
