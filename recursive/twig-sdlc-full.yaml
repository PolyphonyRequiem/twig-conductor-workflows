# twig-sdlc-full — Apex SDLC workflow
#
# Entry point for the full SDLC lifecycle. Routes to planning and/or
# implementation based on observed work item state and user intent.
#
# Nodes:
#   state_detector          — deterministic state inspection (PowerShell script)
#   intent_correction_gate  — human gate when intent=new conflicts with existing work
#   cleanup                 — reset scope for intent=redo
#   planning                — sub-workflow: architect → seed → task decomposition
#   implementation          — sub-workflow: code → review → PR → merge
#   close_out               — lifecycle verification, tagging, state transitions
#   retrospective           — postmortem review and closeout filing
#
# Usage:
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --web
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --input intent=new --web
#   conductor run twig-sdlc-full@twig --input prompt="Add twig export command" --web
workflow:
  name: twig-sdlc-full
  description: Full SDLC — state detection, planning, implementation, close-out, retrospective
  entry_point: state_detector
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      twig:
        command: twig-mcp
        tools: ["*"]
      github:
        command: pwsh
        args: ["-NoProfile", "-File", "recursive/scripts/github-mcp-wrapper.ps1"]
        tools: ["*"]
  input:
    work_item_id:
      type: string
      required: false
      description: ADO work item ID (Epic, Issue, or Task).
    prompt:
      type: string
      required: false
      default: ""
      description: Natural language description of what to build. Creates a new Epic.
    intent:
      type: string
      required: false
      default: resume
      description: >
        User intent: "new" (fresh start, no prior work expected),
        "redo" (delete existing assets and start over),
        "resume" (pick up where we left off).
  context:
    mode: explicit
  limits:
    max_iterations: 250

agents:
  # ── STATE DETECTION (deterministic script) ───────────────────────
  - name: state_detector
    description: Inspects ADO state, plan artifacts, and git state to determine lifecycle phase
    type: script
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/detect-state.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id if workflow.input.work_item_id else 0 }}"
      - "-Intent"
      - "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
    routes:
      - to: intent_correction_gate
        when: "{{ output.intent_conflict }}"
      - to: cleanup
        when: "{{ output.needs_cleanup }}"
      - to: $end
        when: "{{ output.phase == 'done' }}"
      - to: implementation
        when: "{{ output.phase == 'ready_for_implementation' }}"
      - to: planning
        when: "{{ output.phase == 'needs_seeding' or output.phase == 'needs_planning' }}"

  # ── INTENT CORRECTION GATE ──────────────────────────────────────
  - name: intent_correction_gate
    type: human_gate
    description: Intent=new conflicts with existing work — ask user what they meant
    input:
      - state_detector.output
    prompt: |
      ## ⚠️ Intent Conflict — Prior Work Exists

      🔗 [ADO Work Item](https://dev.azure.com/dangreen-msft/Twig/_workitems/edit/{{ workflow.input.work_item_id }})

      You requested `intent=new`, but the state detector found **existing work** for this item:

      ```
      {{ state_detector.output.stdout }}
      ```

      | Option | What happens |
      |--------|-------------|
      | **Resume** | Pick up where the previous run left off — existing children, branches, and PRs are preserved |
      | **Redo** | Delete all existing children, branches, and PRs, then start fresh |
      | **Cancel** | Stop the workflow — no changes made |
    options:
      - label: "Resume where we left off"
        value: "resume"
        route: planning
      - label: "Redo from scratch (deletes existing children, branches, PRs)"
        value: "redo"
        route: cleanup
      - label: "Cancel"
        value: "cancel"
        route: $end

  # ── CLEANUP (intent=redo) ───────────────────────────────────────
  - name: cleanup
    description: Resets work item scope for a fresh start
    model: claude-sonnet-4.6
    tools:
      - twig_set
      - twig_show
      - twig_tree
      - twig_children
      - twig_state
      - twig_note
      - twig_sync
      - twig_update
      - list_pull_requests
      - update_pull_request
    input:
      - workflow.input.work_item_id
      - state_detector.output
    system_prompt: !file ../prompts/cleanup.system.md
    prompt: !file ../prompts/cleanup.prompt.md
    output:
      cleaned:
        type: boolean
      closed_children:
        type: array
      abandoned_prs:
        type: array
      deleted_branches:
        type: array
      summary:
        type: string
    routes:
      - to: planning

  # ── PLANNING (sub-workflow) ─────────────────────────────────────
  - name: planning
    type: workflow
    workflow: ./twig-sdlc-planning.yaml
    input:
      - workflow.input.work_item_id?
      - workflow.input.prompt?
      - workflow.input.intent?
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      prompt: "{{ workflow.input.prompt if workflow.input.prompt else '' }}"
      intent: "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
    output:
      work_item_id:
        type: number
      plan_path:
        type: string
    routes:
      - to: checkout_main

  # ── CHECKOUT MAIN (between planning and implementation) ────────
  - name: checkout_main
    description: Return to main branch after planning to avoid branch contamination
    type: script
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        git checkout main *>$null
        git pull --ff-only *>$null 2>&1
        @{ branch = (git branch --show-current 2>$null); ready = $true } | ConvertTo-Json -Compress
    routes:
      - to: implementation

  # ── IMPLEMENTATION (sub-workflow) ───────────────────────────────
  - name: implementation
    type: workflow
    workflow: ./twig-sdlc-implement.yaml
    input:
      - planning.output?
      - workflow.input.work_item_id?
      - workflow.input.intent?
    input_mapping:
      work_item_id: "{{ planning.output.work_item_id if planning is defined and planning.output is defined else workflow.input.work_item_id }}"
      plan_path: "{{ planning.output.plan_path if planning is defined and planning.output is defined else '' }}"
      intent: "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
      prompt: ""
    output:
      completed_pgs:
        type: array
      verified:
        type: boolean
      summary:
        type: string
    routes:
      - to: close_out

  # ── CLOSE-OUT ───────────────────────────────────────────────────
  - name: close_out
    description: Verify lifecycle completion, transition states, tag version
    model: claude-opus-4.6-1m
    tools:
      - twig_set
      - twig_show
      - twig_tree
      - twig_state
      - twig_note
      - twig_sync
      - list_pull_requests
      - pull_request_read
    input:
      - workflow.input.work_item_id
      - state_detector.output?
      - implementation.output?
    system_prompt: !file ../prompts/close-out.system.md
    prompt: !file ../prompts/close-out.prompt.md
    output:
      work_item_id:
        type: number
      epic_completed:
        type: boolean
      version_tag:
        type: string
      summary:
        type: string
    routes:
      - to: retrospective

  # ── RETROSPECTIVE ───────────────────────────────────────────────
  - name: retrospective
    description: Postmortem review — what went well, what went poorly, improvements
    model: claude-sonnet-4.6
    tools:
      - twig_set
      - twig_show
      - twig_tree
      - twig_new
      - twig_sync
      - twig_update
      - twig_note
      - list_pull_requests
    input:
      - workflow.input.work_item_id
      - state_detector.output?
      - close_out.output?
      - implementation.output?
    system_prompt: !file ../prompts/retrospective.system.md
    prompt: !file ../prompts/retrospective.prompt.md
    output:
      observations:
        type: array
      improvements:
        type: array
      retrospective_issue_id:
        type: number
      summary:
        type: string
    routes:
      - to: $end

output:
  work_item_id: "{{ workflow.input.work_item_id }}"
  phase: "{{ state_detector.output.stdout if state_detector is defined else 'unknown' }}"
  observations: "{{ retrospective.output.summary if retrospective is defined else '' }}"
  improvements: "{{ (retrospective.output.improvements | json) if retrospective is defined else '[]' }}"

