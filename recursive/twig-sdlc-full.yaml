# twig-sdlc-full — Apex SDLC workflow
#
# Entry point for the full SDLC lifecycle. Routes to planning and/or
# implementation based on observed work item state and user intent.
#
# Nodes:
#   state_detector          — deterministic state inspection (PowerShell script)
#   intent_correction_gate  — human gate when intent=new conflicts with existing work
#   cleanup                 — reset scope for intent=redo
#   planning                — sub-workflow: architect → seed → task decomposition
#   implementation          — sub-workflow: code → review → PR → merge
#   close_out               — lifecycle verification, tagging, state transitions
#   retrospective           — postmortem review and closeout filing
#
# Usage:
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --web
#   conductor run twig-sdlc-full@twig --input work_item_id=1234 --input intent=new --web
#   conductor run twig-sdlc-full@twig --input prompt="Add twig export command" --web
workflow:
  name: twig-sdlc-full
  description: Full SDLC — state detection, planning, implementation, close-out, retrospective
  entry_point: state_detector
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      twig:
        command: twig-mcp
        tools: ["*"]
  input:
    work_item_id:
      type: number
      required: false
      description: ADO work item ID (Epic, Issue, or Task).
    prompt:
      type: string
      required: false
      description: Natural language description of what to build. Creates a new Epic.
    intent:
      type: string
      required: false
      default: resume
      description: >
        User intent: "new" (fresh start, no prior work expected),
        "redo" (delete existing assets and start over),
        "resume" (pick up where we left off).
    plan_path:
      type: string
      required: false
      description: >
        Explicit plan file override for debugging/recovery. Only valid
        with intent=resume or intent=redo.
  context:
    mode: explicit
  limits:
    max_iterations: 250

agents:
  # ── STATE DETECTION (deterministic script) ───────────────────────
  - name: state_detector
    description: Inspects ADO state, plan artifacts, and git state to determine lifecycle phase
    type: script
    script:
      command: pwsh
      args:
        - "-NoProfile"
        - "-File"
        - "scripts/detect-state.ps1"
        - "-WorkItemId"
        - "{{ workflow.input.work_item_id | default(0) }}"
        - "-Intent"
        - "{{ workflow.input.intent | default('resume') }}"
        - "{{ '-PlanPath' if workflow.input.plan_path else '' }}"
        - "{{ workflow.input.plan_path | default('') }}"
    output:
      work_item_id:
        type: number
      work_item_type:
        type: string
      work_item_state:
        type: string
      work_item_title:
        type: string
      intent:
        type: string
      phase:
        type: string
        description: "needs_planning, ready_for_implementation, or done"
      has_plan:
        type: boolean
      plan_status:
        type: string
      plan_path:
        type: string
      plan_source:
        type: string
      has_seeded_children:
        type: boolean
      seed_status:
        type: string
      children_summary:
        type: string
      implementation_status:
        type: string
      intent_conflict:
        type: boolean
      needs_cleanup:
        type: boolean
      error:
        type: string
    routes:
      - to: $error
        when: "{{ output.error }}"
      - to: intent_correction_gate
        when: "{{ output.intent_conflict }}"
      - to: cleanup
        when: "{{ output.needs_cleanup }}"
      - to: $end
        when: "{{ output.phase == 'done' }}"
      - to: implementation
        when: "{{ output.phase == 'ready_for_implementation' }}"
      - to: planning

  # ── INTENT CORRECTION GATE ──────────────────────────────────────
  - name: intent_correction_gate
    type: human_gate
    description: Intent=new conflicts with existing work — ask user what they meant
    input:
      - state_detector.output
    prompt: |
      You requested `intent=new` for work item #{{ state_detector.output.work_item_id }}
      ({{ state_detector.output.work_item_title }}), but prior work already exists:

      {% if state_detector.output.has_seeded_children %}
      - **{{ state_detector.output.children_summary }}** child work items exist
      {% endif %}
      {% if state_detector.output.has_plan %}
      - A plan document exists at: {{ state_detector.output.plan_path }}
      {% endif %}

      What would you like to do?
    options:
      - label: "Resume where we left off"
        value: "resume"
        route: planning_or_implementation
      - label: "Redo from scratch (deletes existing children, branches, PRs)"
        value: "redo"
        route: cleanup
      - label: "Cancel"
        value: "cancel"
        route: $end

  # ── PLANNING-OR-IMPLEMENTATION ROUTER ───────────────────────────
  # Routes corrected resume intent to the right phase
  - name: planning_or_implementation
    description: Routes corrected resume intent based on detected phase
    model: claude-sonnet-4.6
    input:
      - state_detector.output
    prompt: |
      The user chose to resume. Based on state detection:
      - Phase: {{ state_detector.output.phase }}
      - Has plan: {{ state_detector.output.has_plan }}
      - Has seeded children: {{ state_detector.output.has_seeded_children }}

      Output the phase for routing. If has_plan AND has_seeded_children, output
      phase="ready_for_implementation". Otherwise output phase="needs_planning".
    output:
      phase:
        type: string
    routes:
      - to: implementation
        when: "{{ output.phase == 'ready_for_implementation' }}"
      - to: planning

  # ── CLEANUP (intent=redo) ───────────────────────────────────────
  - name: cleanup
    description: Resets work item scope for a fresh start
    model: claude-sonnet-4.6
    input:
      - state_detector.output
    system_prompt: !file ../prompts/cleanup.system.md
    prompt: !file ../prompts/cleanup.prompt.md
    output:
      cleaned:
        type: boolean
      closed_children:
        type: array
      abandoned_prs:
        type: array
      deleted_branches:
        type: array
      summary:
        type: string
    routes:
      - to: planning

  # ── PLANNING (sub-workflow) ─────────────────────────────────────
  - name: planning
    type: workflow
    workflow: ./twig-sdlc-planning.yaml
    input:
      - state_detector.output?
      - workflow.input.work_item_id?
      - workflow.input.prompt?
    input_mapping:
      work_item_id: "{{ state_detector.output.work_item_id if state_detector is defined and state_detector.output.work_item_id else workflow.input.work_item_id }}"
      prompt: "{{ workflow.input.prompt | default('') }}"
      intent: "{{ state_detector.output.intent if state_detector is defined else workflow.input.intent | default('resume') }}"
    output:
      epic_id:
        type: number
      epic_title:
        type: string
      plan_path:
        type: string
    routes:
      - to: implementation

  # ── IMPLEMENTATION (sub-workflow) ───────────────────────────────
  - name: implementation
    type: workflow
    workflow: ./twig-sdlc-implement.yaml
    input:
      - state_detector.output?
      - planning.output?
      - workflow.input.work_item_id?
    input_mapping:
      work_item_id: "{{ planning.output.epic_id if planning is defined and planning.output.epic_id is defined else state_detector.output.work_item_id if state_detector is defined else workflow.input.work_item_id }}"
      intent: "{{ state_detector.output.intent if state_detector is defined else workflow.input.intent | default('resume') }}"
    output:
      observations:
        type: string
      completed_prs:
        type: array
      completed_issues:
        type: array
    routes:
      - to: close_out

  # ── CLOSE-OUT ───────────────────────────────────────────────────
  - name: close_out
    description: Verify lifecycle completion, transition states, tag version
    model: claude-opus-4.6-1m
    input:
      - state_detector.output?
      - implementation.output?
    system_prompt: !file ../prompts/close-out.system.md
    prompt: !file ../prompts/close-out.prompt.md
    output:
      work_item_id:
        type: number
      epic_completed:
        type: boolean
      version_tag:
        type: string
      summary:
        type: string
    routes:
      - to: retrospective

  # ── RETROSPECTIVE ───────────────────────────────────────────────
  - name: retrospective
    description: Postmortem review — what went well, what went poorly, improvements
    model: claude-sonnet-4.6
    input:
      - state_detector.output?
      - close_out.output?
      - implementation.output?
    system_prompt: !file ../prompts/retrospective.system.md
    prompt: !file ../prompts/retrospective.prompt.md
    output:
      observations:
        type: array
      improvements:
        type: array
      retrospective_issue_id:
        type: number
      summary:
        type: string
    routes:
      - to: $end

output:
  work_item_id: "{{ state_detector.output.work_item_id if state_detector is defined else workflow.input.work_item_id }}"
  phase: "{{ state_detector.output.phase if state_detector is defined else 'unknown' }}"
  observations: "{{ retrospective.output.summary if retrospective is defined else '' }}"
  improvements: "{{ (retrospective.output.improvements | json) if retrospective is defined else '[]' }}"
