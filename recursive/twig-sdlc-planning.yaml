# twig-sdlc-planning.yaml — Modular SDLC Planner
#
# Thin orchestrator that composes three sub-workflows:
#   1. plan-design   — architect → review → approve → execution planner
#   2. planning-pr   — commit plans, push branch, link artifacts, create PR
#   3. plan-seeding  — create ADO work items, tag PGs, fan-out to child planners
#
# Each sub-workflow has its own idempotency checks for resume support (P3).
#
# Usage:
#   conductor run twig-sdlc-planning@twig --input work_item_id=1234 --web
#   conductor run twig-sdlc-planning@twig --input prompt="Add twig export command" --web
workflow:
  name: twig-sdlc-planning
  description: SDLC Planning — modular design, review, seed pipeline
  entry_point: duplicate_check
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp@latest"]
        tools: ["*"]
      ms-learn:
        type: http
        url: https://learn.microsoft.com/api/mcp
        tools: ["*"]
      twig:
        command: twig-mcp
        tools: ["*"]
  input:
    work_item_id:
      type: number
      required: false
      description: ADO work item ID (Epic, Issue, or Task) to plan.
    prompt:
      type: string
      required: false
      default: ""
      description: Natural language description. Creates a new Epic.
    intent:
      type: string
      required: false
      default: resume
      description: User intent — new, redo, or resume.
  context:
    mode: explicit
  limits:
    max_iterations: 100

agents:
  # ── DUPLICATE CHECK ─────────────────────────────────────────
  - name: duplicate_check
    description: Preflight — detect conflicting conductor runs
    model: claude-sonnet-4.6
    input:
      - workflow.input.work_item_id?
    system_prompt: !file ../prompts/duplicate-check.system.md
    prompt: !file ../prompts/duplicate-check.prompt.md
    output:
      is_duplicate:
        type: boolean
      details:
        type: string
      reason:
        type: string
    routes:
      - to: $end
        when: "{{ output.is_duplicate }}"
      - to: intake

  # ── INTAKE ────────────────────────────────────────────────────
  - name: intake
    description: Reads existing work item or creates one from prompt
    model: claude-sonnet-4.6
    input:
      - workflow.input.work_item_id?
      - workflow.input.prompt?
    system_prompt: !file ../prompts/intake.system.md
    prompt: !file ../prompts/intake.prompt.md
    output:
      work_item_id:
        type: number
      title:
        type: string
      description:
        type: string
      existing_issues:
        type: array
      item_type:
        type: string
    routes:
      - to: design

  # ── PHASE 1: DESIGN (sub-workflow) ────────────────────────────
  - name: design
    type: workflow
    workflow: ./plan-design.yaml
    input:
      - intake.output
      - workflow.input.intent?
      - workflow.input.prompt?
    input_mapping:
      work_item_id: "{{ intake.output.work_item_id }}"
      title: "{{ intake.output.title }}"
      description: "{{ intake.output.description }}"
      item_type: "{{ intake.output.item_type }}"
      existing_issues: "{{ intake.output.existing_issues | json }}"
      intent: "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
      prompt: "{{ workflow.input.prompt if workflow.input.prompt else '' }}"
    output:
      plan_path:
        type: string
      pr_groups:
        type: array
      pr_group_count:
        type: number
      plan_summary:
        type: string
    routes:
      - to: branching

  # ── PHASE 2: PLANNING PR (sub-workflow) ───────────────────────
  - name: branching
    type: workflow
    workflow: ./planning-pr.yaml
    input:
      - design.output
      - intake.output
      - workflow.input.intent?
    input_mapping:
      work_item_id: "{{ intake.output.work_item_id }}"
      plan_path: "{{ design.output.plan_path }}"
      title: "{{ intake.output.title }}"
      intent: "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
    output:
      branch_name:
        type: string
      plan_url:
        type: string
      pr_number:
        type: number
    routes:
      - to: seeding

  # ── PHASE 3: SEEDING (sub-workflow) ───────────────────────────
  - name: seeding
    type: workflow
    workflow: ./plan-seeding.yaml
    input:
      - intake.output
      - design.output
      - workflow.input.intent?
    input_mapping:
      work_item_id: "{{ intake.output.work_item_id }}"
      plan_path: "{{ design.output.plan_path }}"
      pr_groups: "{{ design.output.pr_groups | json }}"
      intent: "{{ workflow.input.intent if workflow.input.intent else 'resume' }}"
    output:
      children:
        type: array
      total_issues:
        type: number
      total_tasks:
        type: number
    routes:
      - to: $end

output:
  work_item_id: "{{ intake.output.work_item_id }}"
  plan_path: "{{ design.output.plan_path if design is defined else '' }}"
  plan_summary: "{{ design.output.plan_summary if design is defined else '' }}"
  total_issues: "{{ seeding.output.total_issues if seeding is defined else 0 }}"
  total_tasks: "{{ seeding.output.total_tasks if seeding is defined else 0 }}"
