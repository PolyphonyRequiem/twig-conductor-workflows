# twig-sdlc-implement — Implementation-only SDLC workflow (v2)
#
# Deterministic orchestration with single review layer.
# Script agents handle routing; LLM agents handle creative work.
#
# Topology:
#   duplicate_check → intake → work_tree_loader
#     → pg_router (SCRIPT, outer loop)
#       → branch_manager (SCRIPT, if PG not started)
#       → task_router (SCRIPT, inner loop)
#         → coder (LLM)
#         → task_router (loops until all tasks done)
#       → pr_submit (LLM, idempotent — detects existing PRs)
#       → pr_reviewer (LLM, single review layer)
#         → pr_fixer (LLM, if rejected) → pr_reviewer (fix loop)
#       → pr_merge (LLM)
#       → issue_closer (SCRIPT)
#       → pg_router (loops to next PG)
#     → pr_finalizer (LLM)
#
# Removed agents (v1 → v2):
#   pr_group_manager (LLM) → replaced by pg_router.ps1 (script)
#   task_manager (LLM)     → replaced by task_router.ps1 (script)
#   task_reviewer           → removed (single review layer at PR level)
#   issue_reviewer          → removed (single review layer at PR level)
#   user_acceptance         → removed (PR review is the quality gate)
#   reducer_code            → removed (unnecessary intermediate)
#   reducer_issue           → removed (unnecessary intermediate)
#   reducer_pr              → removed (unnecessary intermediate)
#
# Usage:
#   conductor run twig-sdlc-implement@twig --input work_item_id=1814 --input plan_path="docs/projects/foo.plan.md" --web
#   conductor run twig-sdlc-implement@twig --input work_item_id=1814 --web
workflow:
  name: twig-sdlc-implement
  description: Implementation-only SDLC — deterministic orchestration, single review layer
  entry_point: duplicate_check
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      twig:
        command: twig-mcp
        tools: ["*"]
      github:
        command: pwsh
        args: ["-NoProfile", "-File", "recursive/scripts/github-mcp-wrapper.ps1"]
        tools: ["*"]
      dotnet:
        command: node
        args: ["recursive/mcp-servers/dotnet-build-test.mjs"]
        tools: ["*"]
      csharp:
        command: node
        args: ["recursive/mcp-servers/csharp-intelligence.mjs"]
        tools: ["*"]
  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID (Epic, Issue, or Task) with seeded work items.
    intent:
      type: string
      required: false
      default: resume
      description: User intent — new, redo, or resume.
    plan_path:
      type: string
      required: false
      default: ""
      description: Path to the approved plan document (e.g., docs/projects/foo.plan.md).
    prompt:
      type: string
      required: false
      default: ""
      description: Not used by implementation — declared for shared intake prompt compatibility.
  context:
    mode: explicit
  limits:
    max_iterations: 120

agents:
  # ── PREFLIGHT ─────────────────────────────────────────────────────
  - name: duplicate_check
    description: Preflight — abort if another conductor run already owns this work item
    model: claude-sonnet-4.6
    tools: []
    input:
      - workflow.input.work_item_id?
    system_prompt: !file ../prompts/duplicate-check.system.md
    prompt: !file ../prompts/duplicate-check.prompt.md
    output:
      is_duplicate:
        type: boolean
      details:
        type: string
      reason:
        type: string
    routes:
      - to: $end
        when: "{{ output.is_duplicate }}"
      - to: intake

  # ── INTAKE ────────────────────────────────────────────────────────
  - name: intake
    description: Reads the work item for implementation context
    model: claude-sonnet-4.6
    tools: ["twig_set", "twig_show", "twig_tree", "twig_children", "twig_workspace", "twig_status", "twig_query"]
    input:
      - workflow.input.work_item_id
      - workflow.input.prompt?
    system_prompt: !file ../prompts/intake.system.md
    prompt: !file ../prompts/intake.prompt.md
    output:
      work_item_id:
        type: number
      title:
        type: string
      description:
        type: string
      existing_issues:
        type: array
      item_type:
        type: string
    routes:
      - to: work_tree_loader

  # ── WORK TREE LOADER (deterministic — no LLM) ──────────────────────
  - name: work_tree_loader
    type: script
    description: Loads ADO work tree and discovers PG structure from work item tags
    input:
      - intake.output
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/load-work-tree.ps1"
      - "-WorkItemId"
      - "{{ intake.output.work_item_id }}"
    routes:
      - to: pg_router

  # ── PG ROUTER (deterministic outer loop) ───────────────────────────
  - name: pg_router
    type: script
    description: Picks the next PR group action based on ADO + git ground truth
    input:
      - intake.output
      - issue_closer.output?
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/pg-router.ps1"
      - "-WorkItemId"
      - "{{ intake.output.work_item_id }}"
    routes:
      - to: branch_manager
        when: "{{ output.action == 'create_branch' }}"
      - to: task_router
        when: "{{ output.action == 'route_tasks' }}"
      - to: pr_submit
        when: "{{ output.action == 'submit_pr' }}"
      - to: pr_finalizer
        when: "{{ output.action == 'all_complete' }}"

  # ── BRANCH MANAGER (deterministic) ─────────────────────────────────
  - name: branch_manager
    type: script
    description: Creates feature branch for a PR group from latest main
    input:
      - pg_router.output
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/branch-manager.ps1"
      - "-BranchName"
      - "{{ pg_router.output.branch_name }}"
    routes:
      - to: task_router

  # ── TASK ROUTER (deterministic inner loop) ─────────────────────────
  - name: task_router
    type: script
    description: Picks the next undone task in a PR group from ADO ground truth
    input:
      - intake.output
      - pg_router.output
      - coder.output?
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/task-router.ps1"
      - "-WorkItemId"
      - "{{ intake.output.work_item_id }}"
      - "-PGName"
      - "{{ pg_router.output.current_pg }}"
    routes:
      - to: coder
        when: "{{ output.action == 'implement_task' }}"
      - to: pg_router
        when: "{{ output.action == 'all_tasks_done' }}"

  # ── CODER ─────────────────────────────────────────────────────────
  - name: coder
    description: Implements a single task with incremental commits
    model: claude-opus-4.6-1m
    tools: ["twig_set", "twig_show", "twig_state", "twig_note", "twig_update", "twig_sync", "list_members", "find_references", "find_definition", "find_implementations", "dotnet_build", "dotnet_test"]
    input:
      - task_router.output
      - pg_router.output
      - intake.output
      - workflow.input.plan_path?
      - pr_reviewer.output?
    system_prompt: !file ../prompts/coder.system.md
    prompt: !file ../prompts/coder.prompt.md
    output:
      task_id:
        type: number
      files_modified:
        type: array
      changes_summary:
        type: string
      tests_added:
        type: array
      commit_hash:
        type: string
      edge_cases_handled:
        type: array
    routes:
      - to: task_router

  # ── PR LIFECYCLE (single review layer) ─────────────────────────────
  - name: pr_submit
    description: Creates or detects existing GitHub PR (idempotent)
    model: claude-sonnet-4.6
    tools: ["list_pull_requests", "create_pull_request", "search_pull_requests"]
    input:
      - pg_router.output
      - intake.output
      - work_tree_loader.output
    system_prompt: !file ../prompts/pr-submit.system.md
    prompt: !file ../prompts/pr-submit.prompt.md
    output:
      pr_url:
        type: string
      pr_number:
        type: number
      pr_title:
        type: string
    routes:
      - to: pr_reviewer

  - name: pr_reviewer
    description: Reviews the full PR (single review layer — no task/issue reviews)
    model: claude-opus-4.6-1m
    tools: ["pull_request_read", "dotnet_build", "dotnet_test"]
    input:
      - pr_submit.output
      - intake.output
      - pg_router.output
    system_prompt: !file ../prompts/pr-reviewer.system.md
    prompt: !file ../prompts/pr-reviewer.prompt.md
    output:
      decision:
        type: string
      feedback:
        type: string
      issues:
        type: array
      approved:
        type: boolean
      strengths:
        type: array
      architecture_issues:
        type: array
      code_issues:
        type: array
      test_gaps:
        type: array
    routes:
      - to: pr_merge
        when: "{{ output.approved }}"
      - to: pr_fixer
        when: "{{ not output.approved }}"

  - name: pr_fixer
    description: Fixes PR-level review issues and pushes to branch
    model: claude-sonnet-4.6
    tools: ["list_members", "find_references", "find_definition", "find_implementations", "dotnet_build", "dotnet_test"]
    input:
      - pr_reviewer.output
      - pr_submit.output
      - intake.output
    system_prompt: !file ../prompts/pr-fixer.system.md
    prompt: !file ../prompts/pr-fixer.prompt.md
    output:
      files_modified:
        type: array
      changes_summary:
        type: string
    routes:
      - to: pr_reviewer

  - name: pr_merge
    description: Merges approved PR and cleans up branch
    model: claude-sonnet-4.6
    tools: ["merge_pull_request"]
    input:
      - pr_submit.output
      - pg_router.output
      - intake.output
    system_prompt: !file ../prompts/pr-merge.system.md
    prompt: !file ../prompts/pr-merge.prompt.md
    output:
      merged:
        type: boolean
      pr_url:
        type: string
      pr_number:
        type: number
      merge_commit:
        type: string
    routes:
      - to: issue_closer
        when: "{{ output.merged }}"
      - to: pr_submit
        when: "{{ not output.merged }}"

  # ── ISSUE CLOSER (deterministic) ──────────────────────────────────
  - name: issue_closer
    type: script
    description: Closes ADO issues for the current PG after PR merge
    input:
      - intake.output
      - pg_router.output
      - pr_merge.output
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/scripts/issue-closer.ps1"
      - "-WorkItemId"
      - "{{ intake.output.work_item_id }}"
      - "-PGName"
      - "{{ pg_router.output.current_pg }}"
      - "-PRNumber"
      - "{{ pr_merge.output.pr_number }}"
    routes:
      - to: pg_router

  # ── PR FINALIZER ──────────────────────────────────────────────────
  - name: pr_finalizer
    description: Verifies all PR groups merged before close-out
    model: claude-sonnet-4.6
    tools: ["twig_set", "twig_show", "twig_tree", "twig_workspace", "list_pull_requests", "search_pull_requests"]
    input:
      - work_tree_loader.output
      - pg_router.output
      - intake.output
      - pr_finalizer.output?
    system_prompt: !file ../prompts/pr-finalizer.system.md
    prompt: !file ../prompts/pr-finalizer.prompt.md
    output:
      verified:
        type: boolean
      unmerged_pr_groups:
        type: array
      orphaned_branches:
        type: array
      state_violations:
        type: array
      summary:
        type: string
      verification_attempt:
        type: number
    routes:
      - to: $end
        when: "{{ output.verified }}"
      - to: pg_router
        when: "{{ not output.verified and output.verification_attempt < 10 }}"
      - to: verification_failure_gate
        when: "{{ not output.verified and output.verification_attempt >= 10 }}"

  # ── VERIFICATION FAILURE GATE ──────────────────────────────────
  - name: verification_failure_gate
    type: human_gate
    description: PR verification failed after 10 attempts — human decides
    input:
      - pr_finalizer.output
    prompt: |
      PR verification has failed after {{ pr_finalizer.output.verification_attempt }} attempts.
      **Unmerged PGs:** {{ pr_finalizer.output.unmerged_pr_groups | json }}
      **Orphaned branches:** {{ pr_finalizer.output.orphaned_branches | json }}
      **State violations:** {{ pr_finalizer.output.state_violations | json }}
      **Summary:** {{ pr_finalizer.output.summary }}
    options:
      - label: "Retry verification"
        value: retry
        route: pr_finalizer
      - label: "Accept as-is and proceed"
        value: accept
        route: $end
      - label: "Abort"
        value: abort
        route: $end

output:
  completed_pgs: "{{ pg_router.output.completed_pgs | json if pg_router is defined else '[]' }}"
  verified: "{{ pr_finalizer.output.verified if pr_finalizer is defined else false }}"
  summary: "{{ pr_finalizer.output.summary if pr_finalizer is defined else '' }}"
