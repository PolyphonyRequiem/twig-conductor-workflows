# twig-sdlc — End-to-End SDLC Conductor Workflow
#
# 5-phase workflow for implementing features in the twig codebase:
#   Phase 1: Intake — read existing work item or create from prompt
#   Phase 2: Planning — architect → technical review → readability review → approval gate
#            (BYPASS: if plan already approved or --input plan_path provided, skips to Phase 3 via plan_reader)
#   Phase 3: Work Tree Seeding — create ADO Issues/Tasks via twig CLI (dupe guard reuses existing items)
#   Phase 4: Implementation — pr_group_manager (outer) → task_manager (inner) → coder/reducer/reviewer loops with PR lifecycle
#            Issue closure is gated on PR merge (structural enforcement via orchestrator split)
#            Post-merge checkpoint: verify branch merged + deleted + Issue state matches before proceeding
#   Phase 5: Close-out — meta-observations (reduction now integrated into PR stage)
#
# Agents: 25 agents + 3 human gates (pr_group_manager + task_manager + pr_finalizer gate)
# Models: Opus 1M for deep reasoning (architect, coder, pr_reviewer, close_out)
#         Sonnet for focused tasks (everything else)
#
# Prompts are externalized to prompts/ directory via !file includes.
#
# Usage (always use --web, NOT --web-bg which doesn't work correctly):
#   conductor --silent run twig-sdlc.yaml --input work_item_id=1273 --web
#   conductor --silent run twig-sdlc.yaml --input prompt="Add a twig export command" --web
#   conductor --silent run twig-sdlc.yaml --input work_item_id=1273 --input skip_plan_review=true --web
#   conductor --silent run twig-sdlc.yaml --input work_item_id=1281 --input plan_path="docs/projects/rich-html-descriptions.plan.md" --web
workflow:
  name: twig-sdlc
  description: End-to-end SDLC workflow — intake through planning, implementation, PR lifecycle, and close-out
  version: "2.1.0"
  entry_point: duplicate_check
  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    mcp_servers:
      web-search:
        command: npx
        args: ["-y", "open-websearch@latest"]
        env:
          MODE: stdio
          DEFAULT_SEARCH_ENGINE: duckduckgo
          ALLOWED_SEARCH_ENGINES: duckduckgo,brave,exa
        tools: ["*"]
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp@latest"]
        tools: ["*"]
      ms-learn:
        type: http
        url: https://learn.microsoft.com/api/mcp
        tools: ["*"]
      twig:
        command: twig-mcp
        tools: ["*"]
  input:
    work_item_id:
      type: number
      required: false
      description: ADO work item ID (Epic or Issue) to implement. Mutually exclusive with prompt.
    prompt:
      type: string
      required: false
      description: Natural language description of what to build. Creates a new Epic if no work_item_id.
    skip_plan_review:
      type: boolean
      required: false
      default: false
      description: Skip the human plan approval gate.
    plan_path:
      type: string
      required: false
      description: Path to an already-approved plan file. Bypasses planning entirely and jumps to work tree seeding.
  context:
    mode: explicit
  limits:
    max_iterations: 200
# =============================================================================
# AGENTS
# =============================================================================
agents:
  # ---------------------------------------------------------------------------
  # PHASE 0: DUPLICATE SESSION CHECK (preflight)
  # ---------------------------------------------------------------------------
  - name: duplicate_check
    description: Preflight — abort if another conductor run or worktree already owns this work item
    model: claude-sonnet-4.6
    input:
      - workflow.input.work_item_id?
    system_prompt: !file ../prompts/duplicate-check.system.md
    prompt: !file ../prompts/duplicate-check.prompt.md
    output:
      is_duplicate:
        type: boolean
        description: True if an active conductor run or conflicting worktree was found for this work item
      details:
        type: string
        description: Description of the conflict (event file, worktree path) — empty if none
      reason:
        type: string
        description: Human-readable summary of the check result
    routes:
      - to: $end
        when: "{{ output.is_duplicate }}"
      - to: intake
  # ---------------------------------------------------------------------------
  # PHASE 1: INTAKE
  # ---------------------------------------------------------------------------
  - name: intake
    description: Reads an existing ADO work item or creates one from a prompt
    model: claude-sonnet-4.6
    input:
      - workflow.input.work_item_id?
      - workflow.input.prompt?
      - workflow.input.plan_path?
    system_prompt: !file ../prompts/intake.system.md
    prompt: !file ../prompts/intake.prompt.md
    output:
      epic_id:
        type: number
        description: The ADO Epic or Issue ID to implement
      epic_title:
        type: string
        description: Title of the work item
      epic_description:
        type: string
        description: Full description and acceptance criteria
      existing_issues:
        type: array
        description: Any existing child Issues (id, title, description) — empty if none
      item_type:
        type: string
        description: Work item type (Epic or Issue)
      plan_already_approved:
        type: boolean
        description: True if an existing approved/in-progress plan was found
      existing_plan_path:
        type: string
        description: Path to existing plan file (empty string if none found)
    routes:
      - to: plan_reader
        when: "{{ output.plan_already_approved }}"
      - to: architect
  # ---------------------------------------------------------------------------
  # PLAN READER (bypass — reads existing approved plan, skips planning phase)
  # ---------------------------------------------------------------------------
  - name: plan_reader
    description: Reads an existing approved plan file and extracts metadata (bypasses architect)
    model: claude-sonnet-4.6
    input:
      - intake.output
    system_prompt: !file ../prompts/plan-reader.system.md
    prompt: !file ../prompts/plan-reader.prompt.md
    output:
      plan_path:
        type: string
        description: Path to the .plan.md file
      plan_summary:
        type: string
        description: Executive summary of the plan
      issue_count:
        type: number
        description: Number of Issues in the plan
      pr_group_count:
        type: number
        description: Number of PR groups in the plan
      total_estimated_loc:
        type: number
        description: Rough total lines of code across all Issues
    routes:
      - to: work_tree_seeder
  # ---------------------------------------------------------------------------
  # PHASE 2: PLANNING
  # ---------------------------------------------------------------------------
  - name: architect
    description: Researches the codebase and creates a solution design with implementation plan
    model: claude-opus-4.6-1m
    input:
      - intake.output
      - workflow.input.prompt?
      - architect.output?
      - review_router.output?
      - plan_approval.output?
      - open_questions_gate.output?
    system_prompt: !file ../prompts/architect.system.md
    prompt: !file ../prompts/architect.prompt.md
    output:
      plan_path:
        type: string
        description: Path to the .plan.md file
      plan_summary:
        type: string
        description: Executive summary of the plan
      issue_count:
        type: number
        description: Number of Issues in the plan
      pr_group_count:
        type: number
        description: Number of PR groups in the plan
      total_estimated_loc:
        type: number
        description: Rough total lines of code across all Issues
      has_blocking_questions:
        type: boolean
        description: Whether there are moderate+ open questions requiring user input
      open_questions_summary:
        type: string
        description: Formatted summary of blocking open questions
      revision_notes:
        type: string
        description: Summary of changes made in this revision ("Initial draft." on first pass)
      plan_revision_count:
        type: number
        description: Number of revision passes performed so far. 0 for the initial draft, increments by 1 each time the architect revises in response to review or user feedback.
    routes:
      - to: open_questions_gate
        when: "{{ output.has_blocking_questions }}"
      - to: technical_reviewer
  - name: open_questions_gate
    type: human_gate
    description: Pauses when the architect identifies blocking open questions that need user input
    input:
      - architect.output.plan_path
      - architect.output.open_questions_summary
    prompt: |
      ## Open Questions Requiring Your Input
      The architect has identified open questions that may significantly impact the design.
      **Plan Document:** {{ architect.output.plan_path }}
      {{ architect.output.open_questions_summary }}
    options:
      # NOTE: first option is auto-selected by --skip-gates — keep safe defaults first
      - label: "Proceed Without Answering"
        value: proceed
        route: technical_reviewer
      - label: "Provide Input & Revise"
        value: provide_input
        route: architect
        prompt_for: feedback
      - label: "Abort Planning"
        value: abort
        route: $end
  - name: technical_reviewer
    description: Validates technical accuracy, feasibility, and completeness of the plan
    model: claude-opus-4.6-1m
    input:
      - architect.output
      - intake.output
    system_prompt: !file ../prompts/technical-reviewer.system.md
    prompt: !file ../prompts/technical-reviewer.prompt.md
    output:
      score:
        type: number
        description: Technical review score 0-100
      feedback:
        type: string
        description: Detailed technical feedback
      critical_issues:
        type: array
        description: Issues that must be fixed before proceeding
    routes:
      - to: readability_reviewer
  - name: readability_reviewer
    description: Ensures the plan is clear, well-structured, and actionable
    model: claude-sonnet-4.6
    input:
      - architect.output
    system_prompt: !file ../prompts/readability-reviewer.system.md
    prompt: !file ../prompts/readability-reviewer.prompt.md
    output:
      score:
        type: number
        description: Readability score 0-100
      feedback:
        type: string
        description: Readability feedback
      critical_issues:
        type: array
        description: Ambiguities or structural problems
    routes:
      - to: review_router
  - name: review_router
    description: Checks both reviewer scores and decides whether to loop or proceed
    model: claude-sonnet-4.6
    input:
      - technical_reviewer.output
      - readability_reviewer.output
      - workflow.input.skip_plan_review?
      - architect.output
    system_prompt: !file ../prompts/review-router.system.md
    prompt: !file ../prompts/review-router.prompt.md
    output:
      tech_score:
        type: number
        description: Technical reviewer score
      read_score:
        type: number
        description: Readability reviewer score
      blocking_issue_count:
        type: number
        description: Total number of critical issues across both reviewers
      both_pass:
        type: boolean
        description: True when blocking_issue_count == 0 AND both scores >= 80 (safety floor). Scores are a backstop; the primary gate is blocking_issue_count == 0.
      skip_approval:
        type: boolean
        description: True if plan is trivial or skip_plan_review is true
      combined_feedback:
        type: string
        description: When looping back, contains ONLY the critical_issues arrays from both reviewers (verbatim). Non-critical feedback is intentionally excluded so the architect does not chase advisory notes.
      plan_revision_count:
        type: number
        description: Mirrored from architect.output.plan_revision_count — used for the 2-revision cap.
    routes:
      - to: architect
        when: "{{ not output.both_pass and output.plan_revision_count < 2 }}"
      - to: work_tree_seeder
        when: "{{ (output.both_pass or output.plan_revision_count >= 2) and output.skip_approval }}"
      - to: plan_approval
  - name: plan_approval
    type: human_gate
    description: Human approval gate for the implementation plan
    input:
      - architect.output
      - review_router.output
    prompt: |
      The implementation plan is ready for review.
      **Plan:** {{ architect.output.plan_path }}
      **Summary:** {{ architect.output.plan_summary }}
      **Issues:** {{ architect.output.issue_count }} | **PR Groups:** {{ architect.output.pr_group_count }} | **Est. LoC:** {{ architect.output.total_estimated_loc }}
      **Tech Score:** {{ review_router.output.tech_score }}/100
      **Readability Score:** {{ review_router.output.read_score }}/100
    options:
      # NOTE: first option is auto-selected by --skip-gates — keep safe defaults first
      - label: "Approve — proceed to implementation"
        value: approved
        route: work_tree_seeder
      - label: "Revise — send back to architect"
        value: revise
        route: architect
        prompt_for: feedback
      - label: "Reject — stop workflow"
        value: rejected
        route: $end
  # ---------------------------------------------------------------------------
  # PHASE 3: WORK TREE SEEDING
  # ---------------------------------------------------------------------------
  - name: work_tree_seeder
    description: Creates ADO Issues and Tasks from the plan via twig CLI
    model: claude-sonnet-4.6
    input:
      - intake.output
      - architect.output?
      - plan_reader.output?
    system_prompt: !file ../prompts/work-tree-seeder.system.md
    prompt: !file ../prompts/work-tree-seeder.prompt.md
    output:
      work_tree:
        type: object
        description: ADO hierarchy — Issues with their child Tasks and all ADO IDs
      pr_groups:
        type: array
        description: Ordered list of PR groups, each with task_ids, issue_ids, title, deep_or_wide, branch_name_suggestion
      total_tasks:
        type: number
        description: Total number of Tasks (created + reused)
      total_issues:
        type: number
        description: Total number of Issues (created + reused)
    routes:
      - to: pr_group_manager
  # ---------------------------------------------------------------------------
  # PHASE 4: IMPLEMENTATION
  # ---------------------------------------------------------------------------
  # ── Outer orchestrator: PR group lifecycle ──────────────────────────
  - name: pr_group_manager
    description: Outer orchestrator — owns PR groups, branch lifecycle, and issue closure (only after PR merge)
    model: claude-sonnet-4.6
    input:
      - work_tree_seeder.output
      - intake.output
      - architect.output?
      - plan_reader.output?
      - pr_group_manager.output?
      - task_manager.output?
      - pr_merge.output?
    system_prompt: !file ../prompts/pr-group-manager.system.md
    prompt: !file ../prompts/pr-group-manager.prompt.md
    output:
      action:
        type: string
        description: Next action — start_tasks, submit_pr, or all_complete
      current_pr_group:
        type: string
        description: Current PR group name/index
      branch_name:
        type: string
        description: Current git branch name
      pr_group_issue_ids:
        type: array
        description: Issue IDs in the current PR group
      pr_group_task_ids:
        type: array
        description: Task IDs in the current PR group
      completed_issues:
        type: array
        description: Issues closed after PR merge
      completed_prs:
        type: array
        description: Completed PR group names
      progress_summary:
        type: string
        description: Human-readable progress summary
    routes:
      - to: task_manager
        when: "{{ output.action == 'start_tasks' }}"
      - to: reducer_pr
        when: "{{ output.action == 'submit_pr' }}"
      - to: pr_finalizer
        when: "{{ output.action == 'all_complete' }}"
  # ── Inner orchestrator: task lifecycle within a PR group ────────────
  - name: task_manager
    description: Inner orchestrator — owns task lifecycle within a PR group. CANNOT close issues or submit PRs.
    model: claude-sonnet-4.6
    input:
      - pr_group_manager.output
      - work_tree_seeder.output
      - intake.output
      - architect.output?
      - plan_reader.output?
      - task_manager.output?
      - task_reviewer.output?
      - issue_reviewer.output?
      - user_acceptance.output?
    system_prompt: !file ../prompts/task-manager.system.md
    prompt: !file ../prompts/task-manager.prompt.md
    output:
      action:
        type: string
        description: Next action — implement_task, issue_review, needs_acceptance, or pr_group_ready
      current_pr_group:
        type: string
        description: Current PR group name (echoed from pr_group_manager)
      branch_name:
        type: string
        description: Current branch name (echoed from pr_group_manager)
      current_issue_id:
        type: number
        description: Current issue ADO ID
      current_issue_title:
        type: string
        description: Current issue title
      current_task_id:
        type: number
        description: Current task ADO ID (0 if action is not implement_task)
      current_task_title:
        type: string
        description: Current task title
      current_task_description:
        type: string
        description: Current task full description
      completed_tasks:
        type: array
        description: List of completed task IDs
      reviewed_issues:
        type: array
        description: Issues that have passed review (but NOT yet closed — pr_group_manager closes them after PR merge)
      progress_summary:
        type: string
        description: Human-readable progress summary
    routes:
      - to: coder
        when: "{{ output.action == 'implement_task' }}"
      - to: reducer_issue
        when: "{{ output.action == 'issue_review' }}"
      - to: user_acceptance
        when: "{{ output.action == 'needs_acceptance' }}"
      - to: pr_group_manager
        when: "{{ output.action == 'pr_group_ready' }}"
  - name: coder
    description: Implements a single task — code changes, tests, incremental commits
    model: claude-opus-4.6-1m
    input:
      - task_manager.output
      - pr_group_manager.output
      - architect.output?
      - plan_reader.output?
      - intake.output
      - task_reviewer.output?
      - pr_reviewer.output?
    system_prompt: !file ../prompts/coder.system.md
    prompt: !file ../prompts/coder.prompt.md
    output:
      task_id:
        type: number
        description: The task ID that was implemented
      files_modified:
        type: array
        description: Files created or modified
      changes_summary:
        type: string
        description: Summary of changes made
      tests_added:
        type: array
        description: Test files and test names added
      commit_hash:
        type: string
        description: Git commit hash
      edge_cases_handled:
        type: array
        description: Edge cases explicitly handled (for reviewer visibility)
    routes:
      - to: task_reviewer
  - name: task_reviewer
    description: Reviews the task implementation for quality, correctness, and completeness
    model: claude-sonnet-4.6
    input:
      - coder.output
      - task_manager.output
      - architect.output?
      - plan_reader.output?
    system_prompt: !file ../prompts/task-reviewer.system.md
    prompt: !file ../prompts/task-reviewer.prompt.md
    output:
      decision:
        type: string
        description: APPROVE or REQUEST_CHANGES
      feedback:
        type: string
        description: Detailed review feedback
      issues:
        type: array
        description: Specific issues to fix (empty if approved)
      approved:
        type: boolean
        description: True if the implementation is approved
      strengths:
        type: array
        description: Things done well in the implementation (reinforces good patterns)
    routes:
      - to: task_manager
        when: "{{ output.approved }}"
      - to: coder
        when: "{{ not output.approved }}"
  - name: user_acceptance
    type: human_gate
    description: Conditional user acceptance gate — triggered when an issue has user-facing changes
    input:
      - task_manager.output
      - architect.output?
      - plan_reader.output?
    prompt: |
      ## User Acceptance Check
      All tasks for issue #{{ task_manager.output.current_issue_id }} — {{ task_manager.output.current_issue_title }} are complete.
      **Plan:** {{ (architect.output.plan_path if architect is defined and architect.output else plan_reader.output.plan_path) }}
      **Completed Tasks:** {{ task_manager.output.completed_tasks | json }}
      **Progress:** {{ task_manager.output.progress_summary }}
      Please verify the implementation meets your expectations.
    options:
      - label: "Accept — looks good"
        value: accepted
        route: task_manager
      - label: "Request Changes"
        value: changes
        route: task_manager
        prompt_for: feedback
      - label: "Skip — no acceptance needed"
        value: skipped
        route: task_manager
  - name: reducer_issue
    description: Post-issue code sweep — simplifies across all tasks in the completed issue
    model: claude-sonnet-4.6
    input:
      - task_manager.output
      - architect.output?
      - plan_reader.output?
    system_prompt: !file ../prompts/reducer.system.md
    prompt: !file ../prompts/reducer-issue.prompt.md
    output:
      findings:
        type: array
        description: Reductions applied or recommended
      changes_applied:
        type: array
        description: Specific changes made
      lines_removed:
        type: number
        description: Net lines removed
    routes:
      - to: issue_reviewer
  - name: issue_reviewer
    description: Reviews the complete issue implementation against acceptance criteria
    model: claude-opus-4.6-1m
    input:
      - task_manager.output
      - architect.output?
      - plan_reader.output?
      - reducer_issue.output
    system_prompt: !file ../prompts/issue-reviewer.system.md
    prompt: !file ../prompts/issue-reviewer.prompt.md
    output:
      decision:
        type: string
        description: APPROVE or REQUEST_CHANGES
      feedback:
        type: string
        description: Detailed review feedback
      issues:
        type: array
        description: Specific issues to fix (empty if approved)
      approved:
        type: boolean
        description: Whether the issue implementation is approved
      strengths:
        type: array
        description: Things done well across the issue implementation
    routes:
      - to: task_manager
  - name: pr_submit
    description: Creates a GitHub PR for the current PR group
    model: claude-sonnet-4.6
    input:
      - pr_group_manager.output
      - task_manager.output?
      - architect.output?
      - plan_reader.output?
      - work_tree_seeder.output
    system_prompt: !file ../prompts/pr-submit.system.md
    prompt: !file ../prompts/pr-submit.prompt.md
    output:
      pr_url:
        type: string
        description: URL of the created PR
      pr_number:
        type: number
        description: PR number
      pr_title:
        type: string
        description: PR title
    routes:
      - to: pr_reviewer
  - name: pr_reviewer
    description: Reviews the full PR diff for architecture coherence and cross-cutting concerns
    model: claude-opus-4.6-1m
    input:
      - pr_submit.output
      - architect.output?
      - plan_reader.output?
      - pr_group_manager.output
    system_prompt: !file ../prompts/pr-reviewer.system.md
    prompt: !file ../prompts/pr-reviewer.prompt.md
    output:
      decision:
        type: string
        description: APPROVE or REQUEST_CHANGES
      feedback:
        type: string
        description: Review feedback
      issues:
        type: array
        description: Issues to fix
      approved:
        type: boolean
        description: True if PR is approved
      strengths:
        type: array
        description: Things done well across the PR
      architecture_issues:
        type: array
        description: Architecture or design issues found
      code_issues:
        type: array
        description: Code quality or consistency issues found
      test_gaps:
        type: array
        description: Test coverage gaps identified
    routes:
      - to: pr_merge
        when: "{{ output.approved }}"
      - to: pr_fixer
        when: "{{ not output.approved }}"
  - name: pr_fixer
    description: Fixes PR-level issues identified by the reviewer
    model: claude-sonnet-4.6
    input:
      - pr_reviewer.output
      - pr_submit.output
      - architect.output?
      - plan_reader.output?
    system_prompt: !file ../prompts/pr-fixer.system.md
    prompt: !file ../prompts/pr-fixer.prompt.md
    output:
      files_modified:
        type: array
        description: Files modified to address feedback
      changes_summary:
        type: string
        description: Summary of fixes applied
    routes:
      - to: pr_submit
  - name: pr_merge
    description: Merges the approved PR and cleans up the branch
    model: claude-sonnet-4.6
    input:
      - pr_submit.output
      - pr_group_manager.output
      - architect.output?
      - plan_reader.output?
    system_prompt: !file ../prompts/pr-merge.system.md
    prompt: !file ../prompts/pr-merge.prompt.md
    output:
      merged:
        type: boolean
        description: Whether the PR was merged successfully
      pr_url:
        type: string
        description: URL of the merged PR
      pr_number:
        type: number
        description: GitHub PR number
      pr_group_name:
        type: string
        description: Name of the PR group that was merged (e.g. PG-1)
      branch_name:
        type: string
        description: Branch that was merged and deleted
      merge_commit:
        type: string
        description: Merge commit SHA on main
      issue_ids:
        type: array
        description: ADO Issue IDs included in this PR group
    routes:
      - to: pr_group_manager
  # ---------------------------------------------------------------------------
  # PR FINALIZATION GATE (verifies all PR groups merged before close-out)
  # ---------------------------------------------------------------------------
  - name: pr_finalizer
    description: Verifies every PR group has a merged GitHub PR and no orphaned branches exist before allowing close-out
    model: claude-sonnet-4.6
    input:
      - work_tree_seeder.output
      - pr_group_manager.output
      - intake.output
      - pr_finalizer.output?
    system_prompt: !file ../prompts/pr-finalizer.system.md
    prompt: !file ../prompts/pr-finalizer.prompt.md
    output:
      verified:
        type: boolean
        description: True only if every PR group has a confirmed merged PR
      unmerged_pr_groups:
        type: array
        description: PR group names that lack merged PRs
      orphaned_branches:
        type: array
        description: Feature branches with unmerged work
      state_violations:
        type: array
        description: Issues marked Done without merged code
      summary:
        type: string
        description: Human-readable verification summary
      verification_attempt:
        type: number
        description: Current verification attempt count (1-based)
    routes:
      - to: close_out
        when: "{{ output.verified or output.verification_attempt >= 3 }}"
      - to: pr_group_manager
        when: "{{ not output.verified and output.verification_attempt < 3 }}"
  # ---------------------------------------------------------------------------
  # PR-STAGE REDUCTION (runs before PR submission, not post-merge)
  # ---------------------------------------------------------------------------
  - name: reducer_pr
    description: Pre-PR reduction sweep — simplifies all changes in the PR group before submission
    model: claude-sonnet-4.6
    input:
      - pr_group_manager.output
      - task_manager.output?
      - architect.output?
      - plan_reader.output?
      - intake.output
    system_prompt: !file ../prompts/reducer.system.md
    prompt: !file ../prompts/reducer-pr.prompt.md
    output:
      findings:
        type: array
        description: Reduction findings for this PR group
      changes_applied:
        type: array
        description: Changes made in the reduction pass
      total_lines_removed:
        type: number
        description: Total lines removed
    routes:
      - to: pr_submit
  # ---------------------------------------------------------------------------
  # PHASE 5: CLOSE-OUT
  # ---------------------------------------------------------------------------
  - name: close_out
    description: Transitions the work item to Done and produces meta-observations
    model: claude-opus-4.6-1m
    input:
      - intake.output
      - architect.output?
      - plan_reader.output?
      - pr_group_manager.output
      - pr_finalizer.output
      - work_tree_seeder.output
    system_prompt: !file ../prompts/close-out.system.md
    prompt: !file ../prompts/close-out.prompt.md
    output:
      observations:
        type: string
        description: Meta-observations about workflow execution
      agent_struggles:
        type: array
        description: Specific agent struggles or failures observed
      improvements:
        type: array
        description: Suggested workflow improvements for future runs
      epic_completed:
        type: boolean
        description: Whether the Epic was transitioned to Done
    routes:
      - to: $end
# =============================================================================
# WORKFLOW OUTPUT
# =============================================================================
output:
  observations: "{{ close_out.output.observations if close_out is defined else duplicate_check.output.reason }}"
  improvements: "{{ (close_out.output.improvements | json) if close_out is defined else '[]' }}"
